<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Search</title>
    <style>
        /* =========================================
           1. 全局变量与字体引入
           ========================================= */
        :root {
            --chrome-bg: #dee1e6;
            --toolbar-bg: #ffffff;
            --url-bar-bg: #f1f3f4;
            --win-close-hover: #e81123;
            --win-btn-hover: rgba(0, 0, 0, 0.1);
        }

        /* 引入主界面的 Google Sans */
        @font-face {
            font-family: 'Google Sans Variable';
            src: url('GoogleSans-Variable.ttf') format('truetype');
            font-weight: 100 900; 
            font-style: normal;
        }

        body {
            margin: 0; background-color: #1a1a1a; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* =========================================
           2. 完美复刻的窗口外壳与标签栏
           ========================================= */
        .browser-container {
            width: 90%; height: 90%; background: var(--toolbar-bg);
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border-radius: 12px; overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.1); position: relative;
        }

        .title-bar {
            height: 33px; background: var(--chrome-bg);
            display: flex; align-items: flex-end; padding: 0; 
        }

        .tab-search-btn {
            width: 24px; height: 24px; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            align-self: center; margin-left: 8px; margin-right: 4px;
            color: #444746;
        }
        .tab-search-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .tabs { display: flex; align-items: flex-end; height: 100%; padding-left: 4px; }
        .tab {
            position: relative; width: 200px; height: 27px; 
            background: var(--toolbar-bg); font-size: 12px;
            display: flex; align-items: center; padding: 0 16px;
            border-radius: 8px 8px 0 0; color: #333; z-index: 10;
        }
        .tab::before, .tab::after {
            content: ""; position: absolute; bottom: 0; width: 10px; height: 10px;
        }
        .tab::before { left: -10px; background: radial-gradient(circle at 0 0, transparent 10px, var(--toolbar-bg) 10.5px); }
        .tab::after { right: -10px; background: radial-gradient(circle at 100% 0, transparent 10px, var(--toolbar-bg) 10.5px); }

        .window-controls { display: flex; height: 100%; margin-left: auto; }
        .win-btn {
            width: 46px; height: 100%; display: flex; text-decoration: none;
            justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.1s; color: #1a1a1a;
        }
        .win-btn svg { width: 10px; height: 10px; }
        .win-btn:hover { background: var(--win-btn-hover); }
        .win-btn.close:hover { background: var(--win-close-hover); color: white; }

        /* =========================================
           3. 工具栏与地址栏
           ========================================= */
        .toolbar {
            position: relative; z-index: 20; height: 44px;
            background-color: var(--toolbar-bg); display: flex;
            align-items: center; padding: 0 8px; gap: 8px;
            border-bottom: 1px solid #e5e5e5;
        }

        .nav-icons { display: flex; gap: 4px; padding-right: 4px; }
        .icon-btn {
            width: 28px; height: 28px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; 
            cursor: pointer; transition: background 0.15s; text-decoration: none;
        }
        .icon-btn:hover { background-color: rgba(0, 0, 0, 0.1); }
        .icon-btn svg { width: 18px; height: 18px; fill: #5f6368; }
        .icon-btn.disabled { opacity: 0.35; cursor: default; }

        .url-bar-wrapper {
            flex: 1; height: 28px; background-color: var(--url-bar-bg);
            border-radius: 14px; display: flex; align-items: center;
            padding: 0 12px; text-decoration: none;
        }
        .url-bar-content { display: flex; align-items: center; gap: 10px; }
        .lock-icon { width: 14px; height: 14px; fill: #5f6368; }
        .placeholder-text { font-size: 13px; color: #5f6368; user-select: none; }

        /* =========================================
           4. 网页正文区 (搜索框与排版墙)
           ========================================= */
        .web-content {
            flex: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; padding-top: 80px; background: #ffffff;
            overflow-y: auto; overflow-x: hidden; /* 允许排版过长时内部滚动 */
        }

        /* 保证原生 UI 悬浮在排版文字之上 */
        .ui-layer {
            position: relative;
            z-index: 100; /* 高层级 */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            pointer-events: none; /* 让点击穿透空白区域 */
        }
        
        /* 恢复搜索框和按钮的可点击状态 */
        .native-search-field, .btn-row { pointer-events: auto; }

        .google-logo { 
            font-family: 'Google Sans Variable', sans-serif;
            font-weight: 560; font-size: 80px; margin-bottom: 30px; letter-spacing: -1px; 
        }
        .google-logo span { color: #ababab; }

        .native-search-field {
            height: 44px; width: 584px; background: #ffffff; display: flex; align-items: center;
            border-radius: 24px; box-sizing: border-box; padding: 0 12px 0 14px;
            box-shadow: 0 0 0 1px #c5c7cb, 0 1px 3px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.2s;
        }
        .native-search-field:focus-within { box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28); }
        .native-search-field:hover { box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28); }

        .search-icon-slot { display: flex; align-items: center; margin-right: 12px; }
        .native-search-svg { width: 20px; height: 20px; fill: #202124; }

        /* 核心修改：真正的 Input 框嵌入 */
        .native-input {
            flex: 1; height: 100%; border: none; outline: none;
            background: transparent; font-size: 16px; color: #202124;
            font-family: 'Google Sans Variable', 'Segoe UI', sans-serif;
        }

        .mic-icon-slot { display: flex; align-items: center; cursor: pointer; }
        .native-mic-svg { width: 24px; height: 24px; fill: #bcbcbc; }

        .btn-row { margin-top: 30px; display: flex; gap: 12px; }
        .fake-google-btn {
            height: 36px; padding: 0 16px; background: #f8f9fa;
            border-radius: 4px; font-size: 14px; line-height: 36px;
            cursor: pointer; color: #202124; border: 1px solid #f8f9fa;
        }
        .fake-google-btn:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,.1); }

        /* =========================================
           5. 背景排版网格 (Typography Wall)
           ========================================= */
        #container-a {
            position: absolute;
            top: 0; left: 0; width: 100%; min-height: 100%;
            padding: 240px 5% 80px 5%; /* 顶部留足 240px 避开悬浮的 UI 层 */
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 均分四栏 */
            column-gap: 5%; /* 栏间距 5% */
            z-index: 1;
            pointer-events: none; /* 排版文字不阻挡点击 */
        }

        .typo-module {
            word-wrap: break-word;
            word-break: break-all;
            margin-bottom: 40px;
        }

        /* 第一栏：20pt 黑色 */
        .style-black {
            grid-column: 1 / 3;
            font-family:Helvetica, 'Google Sans Variable', sans-serif;
            font-size: 20pt; color: #6e6e6e; line-height: 1.2;
            word-spacing: 0.1em; letter-spacing: -0.01em;
        }

        /* 第三栏：35pt 灰色倾斜 */
        .style-grey {
            grid-column: 3 / 5;
            font-family:Helvetica, 'Google Sans Variable', sans-serif;
            font-size: 35pt; color: #ababab; line-height: 1.1; font-style: italic;
            word-spacing: 0.08em; letter-spacing: -0.02em;
        }
    </style>
</head>
<body>

    <div class="browser-container">
        <div class="title-bar">
            <div class="tab-search-btn"><svg viewBox="0 0 16 16"><path d="M12.14 5.5L8 9.64 3.86 5.5 2.5 6.86 8 12.36l5.5-5.5z" fill="currentColor"/></svg></div>
            <div class="tabs"><div class="tab">Searching bar</div></div>
            <div class="window-controls">
                <div class="win-btn"><svg width="10" height="1" viewBox="0 0 10 1"><path d="M0 0h10v1H0z" fill="currentColor"/></svg></div>
                <div class="win-btn"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0h10v10H0V0zm1 1v8h8V1H1z" fill="currentColor"/></svg></div>
                <a href="index.html" class="win-btn close"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0l1 1 4 4-4 4 1 1 4-4 4 4 1-1-4-4 4-4-1-1-4 4-4-4z" fill="currentColor"/></svg></a>
            </div>
        </div>

        <div class="toolbar">
            <div class="nav-icons">
                <a href="index.html" class="icon-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
                <div class="icon-btn disabled"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></div>
                <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div>
            </div>
            <div class="url-bar-wrapper">
                <div class="url-bar-content">
                    <svg class="lock-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                    <span class="placeholder-text">https://www.searchingbar.com</span>
                </div>
            </div>
        </div>

        <div class="web-content">
            <div class="ui-layer">
                <div class="google-logo"><span>Google</span></div>
                <div class="native-search-field">
                    <div class="search-icon-slot">
                        <svg viewBox="0 0 24 24" class="native-search-svg"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" /></svg>
                    </div>
                    <input type="text" id="main-search" class="native-input" autofocus>
                    <div class="mic-icon-slot" id="mic-btn">
                        <svg viewBox="0 0 24 24" class="native-mic-svg"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" /></svg>
                    </div>
                </div>
                <div class="btn-row">
                    <div class="fake-google-btn" id="search-btn">Search</div>
                </div>
            </div>

            <div id="container-a"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('main-search');
        const searchBtn = document.getElementById('search-btn');
        const containerA = document.getElementById('container-a');

        let modulesData = []; 
        let currentModuleIndex = 0;

        // 统一处理输入的逻辑
        function processInput() {
            const val = input.value.trim();
            if (val.length > 0) {
                // 将输入的内容按空格拆分为单词数组
                const words = val.split(/\s+/).filter(w => w.length > 0);
                
                // 将单词分配进排版系统
                words.forEach(word => {
                    distributeWord(word);
                });

                renderTypography();
                
                // 清空输入框，但不影响背景排版
                setTimeout(() => { input.value = ""; }, 10);
            }
        }

        // 监听：键盘敲击空格或回车
        input.addEventListener('keydown', (e) => {
            if (e.key === " " || e.key === "Enter") {
                processInput();
            }
        });

        // 监听：点击 Search 按钮
        searchBtn.addEventListener('click', () => {
            processInput();
            input.focus(); // 保持焦点
        });

        // 核心分配逻辑：随机长度与黑灰交替
        function distributeWord(word) {
            // 如果模块为空，或当前模块字数已达上限，则创建新模块
            if (modulesData.length === 0 || 
                modulesData[currentModuleIndex].words.length >= modulesData[currentModuleIndex].limit) {
                
                if (modulesData.length > 0) currentModuleIndex++;

                // 决定类型：黑色或灰色交替
                const nextType = (modulesData.length % 2 === 0) ? 'black' : 'grey';
                
                // 决定当前模块的随机寿命：5 到 50 个词之间
                const randomLimit = Math.floor(Math.random() * (50 - 5 + 1)) + 5;

                modulesData.push({
                    type: nextType,
                    limit: randomLimit,
                    words: []
                });
            }

            modulesData[currentModuleIndex].words.push(word);
        }

        // 渲染到屏幕上的四栏网格中
        function renderTypography() {
            containerA.innerHTML = ""; 

            modulesData.forEach(mod => {
                const div = document.createElement('div');
                div.className = `typo-module ${mod.type === 'black' ? 'style-black' : 'style-grey'}`;
                
                div.innerText = mod.words.join(" ") + " ";
                containerA.appendChild(div);
            });
            
            // 可选：让屏幕自动向下滚动，追随最新的排版
            document.querySelector('.web-content').scrollTop = document.querySelector('.web-content').scrollHeight;
        }
    </script>
</body>
</html>
