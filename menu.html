<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A webpage is...</title>
    <style>
        /* 1. 基础背景设置 */
        body {
            background-color: #523B2C; /* 背景 */
            margin: 0;
            height: 100vh;
            overflow: hidden; /* 防止出现滚动条 */
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. 左上角快捷列表 */
        .nav-list {
            position: fixed;
            top: 10px;
            left: 20px;
            z-index: 100;
            color: #fff;
            font-size: 14px;
            line-height: 1.3;
            font-family: Arial, Helvetica, sans-serif;
        }
        .nav-list a {
            color: #fff;
            text-decoration: none;
            display: block;
        }
        .nav-list a:hover {
            text-decoration: underline;
        }

        /* 3. 卡牌通用容器 */
        .card-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 4. 单个卡牌样式 */
        .card {
            position: absolute;
            width: 450px; /* 卡牌宽度 */
            height: 450px; /* 卡牌高度，保持正方形 */
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        /* 5. 卡牌内部图片层 */
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 悬停前的图片（正面） */
        .img-front { display: block; }
        /* 悬停后的图片（反面） */
        .img-hover { display: none; }

        /* 悬停交互：换图 + 变色 (这里通过滤镜或遮罩模拟变色) */
        .card:hover .img-front { display: none; }
        .card:hover .img-hover { display: block; }
        .card:hover {
            z-index: 50; /* 悬停时置顶 */
            outline: 5px solid #fff; /* 悬停时的边框感 */
        }

        /* ------------------------------------------------
           6. 调整位置的关键代码 (修改这里的 top/left/rotate)
           ------------------------------------------------ */
        
        #card1 { 
            top: 5%; left: 15%; 
            transform: rotate(20deg); 
            background-color: #5d83d4; /* 左2 */
            z-index: 10; /* 最大，在最上面 */
        }
        #card2 { 
            top: 3%; left: 50%; 
            transform: rotate(-3deg); 
            background-color: #f5f2e0; /* 左3 */
            z-index: 20; 
        }
        #card3 { 
            top: 45%; left: 1%; 
            transform: rotate(-5deg); 
            background-color: #fff; /* 左1 */
        }
        #card4 { 
            top: 30%; left: 65%; 
            transform: rotate(-5deg); 
            background-color: #b0b0b0; /* 左4 */
            z-index: 40; /* 最大，在最上面 */
        }

    </style>
</head>
<body>

    <div class="nav-list">
        <p>A webpage is about... ...</p>
        <a href="cursor.html">a cursor</a>
        <a href="navbar.html">a URL bar</a>
        <a href="scrollbar.html">a scrollbar</a>
        <a href="controls.html">a control</a>
    </div>

    <div class="card-container">
        
        <a href="cursor.html" class="card" id="card1">
            <img src="card-20.jpg" class="card-img img-front" alt="正面">
            <img src="card-24.jpg" class="card-img img-hover" alt="悬停">
        </a>

        <a href="navbar.html" class="card" id="card2">
            <img src="card-21.jpg" class="card-img img-front">
            <img src="card-25.jpg" class="card-img img-hover">
        </a>

        <a href="scrollbar.html" class="card" id="card3">
            <img src="card-19.jpg" class="card-img img-front">
            <img src="card-23.jpg" class="card-img img-hover">
        </a>

        <a href="controls.html" class="card" id="card4">
            <img src="card-22.jpg" class="card-img img-front">
            <img src="card-26.jpg" class="card-img img-hover">
        </a>

    </div>

</body>
</html>
